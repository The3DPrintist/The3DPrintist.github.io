<!DOCTYPE html>
<html>

<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <link rel="stylesheet" href="../../style.css">
  <title>Send Stuff to my Printer</title>
  <meta name="referrer" content="no-referrer">
</head>

<body>
  
<div class="margin">
  <h1>Send Stuff to my Printer</h1>
</div>

<div class="section" style="text-align: left;">
    <p>
        I have a receipt printer by my computer, this website lets you send messages to it!
    </p>
    <p>
        If you know me, feel free to ask for a photo of what you sent.
    </p>
    <p>
        To send an image, use the file upload!
    </p>
    <p>
        Make sure to check the preview!
    </p>

</div>

<div class="margincenter">

    <div class ="flexbox">

        <div class="flexsection" style="flex: 2; text-align: center;">
            <div class="fileWrapper" style="width: 100%; height:96px;">
                <p style="margin: 0px;">Drop an image here</p>
                <input type="file" class="file" id="imageUploader" multiple="multiple" accept="image/*">
            </div>

            <p></p>

            <textarea class="textarea" id="message" name="message" rows="4" cols="50" style="width: 100%; min-height: 100px;" placeholder="Hello World!"></textarea>

            <p></p>

            <p id="counter">characters</p>
            <button class="btn btn-outline-light" onclick="sendClicked();" id="gen" style="width: 50%; height: 64px; ">Send</button>
        </div>
    
    </div>


    <div class ="flexbox">
        <div class="flexsectioninvis" style="flex: 1; text-align: center; ">
            <h2>Preview:</h2>
            <canvas id="preview" width="536" height="48" style="max-width: 536px; width: 100%; height: auto;"></canvas>
        </div>
    </div>



</div>

<script src="serverstuff.js"></script>
<script src="imagestuff.js"></script>
<script src="previewstuff.js"></script>
<script src="print.js"></script>
<script>//hey nerd looking at the code, I know I implemented a lot of anti spam here, just know that doesn't mean I didn't ALSO implement it on the receiving end, OK?</script>


</body>
</html>
